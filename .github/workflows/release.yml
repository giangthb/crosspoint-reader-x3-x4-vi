name: Release firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0-x3-vi)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Build gh_release
        run: pio run -e gh_release

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum .pio/build/gh_release/firmware.bin | cut -d' ' -f1)
          SIZE=$(stat -c%s .pio/build/gh_release/firmware.bin)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "firmware SHA256: $SHA"
          echo "firmware size:   $SIZE bytes"

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      # Upload only; do NOT overwrite body/name of an existing release so that
      # custom Vietnamese release notes we curate by hand stay intact. The
      # workflow just ensures the CI-built firmware.bin is attached to the tag.
      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: .pio/build/gh_release/firmware.bin
          fail_on_unmatched_files: true
